<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wireframes — Учёт отгрузок</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ede8; font-family: 'Caveat', cursive; }

  /* Sketch styles */
  .sk { font-family: 'Caveat', cursive; }
  .sk-box {
    border: 2px solid #333;
    border-radius: 3px;
    background: #fff;
    position: relative;
  }
  .sk-box::before {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 2px;
    border: 1px solid #aaa;
    pointer-events: none;
  }
  .sk-gray { background: #e8e5df; }
  .sk-stripe {
    background: repeating-linear-gradient(
      -45deg, #f5f3ef, #f5f3ef 4px, #e8e5df 4px, #e8e5df 8px
    );
  }
  .sk-label {
    font-family: 'Caveat', cursive;
    font-size: 13px;
    color: #666;
    text-align: center;
    padding: 4px;
  }
  .sk-accent { background: #d4e8c2; }
  .sk-accent2 { background: #c2d4e8; }
  .sk-accent3 { background: #e8d4c2; }
  .sk-accent4 { background: #e8c2d4; }
  .sk-week { background: #2a2a2a; color: #fff; }
  .sk-day { background: #444; color: #fff; }
  .sk-subtotal { background: #f0f0c8; border-top: 2px dashed #bbb; }

  /* Auto-hiding overlay scrollbar */
  .wsm-scroll {
    scrollbar-width: thin;
    scrollbar-color: transparent transparent;
    transition: scrollbar-color 0.4s ease;
  }
  .wsm-scroll:hover,
  .wsm-scroll.is-scrolling {
    scrollbar-color: rgba(60,60,60,0.55) transparent;
  }
  .wsm-scroll::-webkit-scrollbar {
    width: 8px;
  }
  .wsm-scroll::-webkit-scrollbar-track {
    background: transparent;
  }
  .wsm-scroll::-webkit-scrollbar-thumb {
    background: transparent;
    border-radius: 4px;
    transition: background 0.4s ease;
  }
  .wsm-scroll:hover::-webkit-scrollbar-thumb,
  .wsm-scroll.is-scrolling::-webkit-scrollbar-thumb {
    background: rgba(60,60,60,0.55);
  }
  .wsm-scroll::-webkit-scrollbar-thumb:hover {
    background: rgba(40,40,40,0.75);
  }

  .annotation {
    font-family: 'Caveat', cursive;
    font-size: 14px;
    color: #e05a1a;
    position: absolute;
    pointer-events: none;
  }
  .arrow {
    display: inline-block;
    font-size: 18px;
    color: #e05a1a;
  }
</style>
</head>
<body>
<script type="text/babel">
const { useState } = React;

/* ─────────── REUSABLE SKETCH ATOMS ─────────── */

const Box = ({ w, h, style, className = '', children, onClick }) => (
  <div
    onClick={onClick}
    className={`sk-box ${className}`}
    style={{ width: w, height: h, overflow: 'hidden', ...style }}
  >
    {children}
  </div>
);

const Label = ({ children, size = 13, color = '#555', bold, center, style = {} }) => (
  <div style={{
    fontFamily: 'Caveat, cursive',
    fontSize: size,
    color,
    fontWeight: bold ? 700 : 400,
    textAlign: center ? 'center' : 'left',
    lineHeight: 1.2,
    ...style
  }}>
    {children}
  </div>
);

const Pill = ({ children, color = '#e8e5df', textColor = '#333', size = 12 }) => (
  <div style={{
    display: 'inline-flex', alignItems: 'center', padding: '1px 8px',
    background: color, border: '1.5px solid #333', borderRadius: 20,
    fontFamily: 'Caveat', fontSize: size, color: textColor,
    whiteSpace: 'nowrap'
  }}>
    {children}
  </div>
);

const HR = ({ dashed, color = '#bbb', my = 4 }) => (
  <div style={{
    borderTop: `1.5px ${dashed ? 'dashed' : 'solid'} ${color}`,
    margin: `${my}px 0`
  }} />
);

const Row = ({ cols, heights = 26, bg, bold, border }) => {
  const colWidths = cols.map(c => c.w || 80);
  return (
    <div style={{
      display: 'flex',
      height: heights,
      background: bg || 'transparent',
      borderBottom: border ? '1px solid #ccc' : undefined
    }}>
      {cols.map((c, i) => (
        <div key={i} style={{
          width: colWidths[i],
          flexShrink: 0,
          borderRight: i < cols.length - 1 ? '1px solid #ccc' : undefined,
          padding: '2px 5px',
          display: 'flex',
          alignItems: 'center',
          overflow: 'hidden'
        }}>
          <span style={{
            fontFamily: 'Caveat, cursive',
            fontSize: c.size || 12,
            color: c.color || (bold ? '#000' : '#333'),
            fontWeight: bold || c.bold ? 700 : 400,
            whiteSpace: 'nowrap',
            overflow: 'hidden',
            textOverflow: 'ellipsis'
          }}>
            {c.text}
          </span>
        </div>
      ))}
    </div>
  );
};

/* ─────────── COLOR MAP BY RAW MATERIAL ─────────── */
const RAW_COLORS = {
  'Огурцы':    { bg: '#d4eac2', dot: '#4a8f2a' },
  'Черри':     { bg: '#ffd0c0', dot: '#c24a28' },
  'Томаты':    { bg: '#ffe0b8', dot: '#c87020' },
  'Патиссоны': { bg: '#fff4a8', dot: '#c49a00' },
  'Халапеньо': { bg: '#c4dca8', dot: '#1e5020' },
  'Перец':     { bg: '#f0d8c8', dot: 'linear-gradient(135deg,#c03030 0%,#c03030 50%,#3a8a2a 50%,#3a8a2a 100%)' },
  'Баклажан':  { bg: '#d8c0e8', dot: '#6030a0' },
};

/* Status chip */
const StatusChip = ({ status }) => {
  if (status === 'Отправлено') {
    return <Pill color="#c8e8c8" textColor="#1a6b3a" size={11}>✓ Отпр.</Pill>;
  }
  return <Pill color="#fff0c8" textColor="#a06000" size={11}>◷ Заплан.</Pill>;
};

/* ITEM LINE — one supplier+raw within a shipment */
const ItemLine = ({ raw, kg, supplier, tara, processed, actNumber, isFirst, isLast, compact }) => {
  const c = RAW_COLORS[raw] || { bg: '#eee', dot: '#999' };
  const py = compact ? '1px 6px' : '2px 6px';
  const minH = compact ? 20 : 24;
  const rowBg = processed
    ? 'repeating-linear-gradient(135deg,#ececec,#ececec 4px,#e0e0e0 4px,#e0e0e0 8px)'
    : c.bg + '55';
  const textDeco = processed ? 'line-through' : 'none';
  const textCol  = processed ? '#666' : '#222';
  return (
    <div style={{
      display:'flex', alignItems:'stretch',
      background: rowBg,
      borderTop: isFirst ? 'none' : '1px dashed #c8d0bd',
      minHeight: minH
    }}>
      <div style={{ width: 4, background: c.dot, flexShrink: 0 }} />
      {/* Сырьё */}
      <div style={{ width: 102, padding: py, display:'flex',alignItems:'center',gap:4 }}>
        <div style={{ width:8, height:8, borderRadius:8, background:c.dot, flexShrink:0 }} />
        <Label size={12} bold color={textCol} style={{textDecoration:textDeco}}>{raw}</Label>
      </div>
      {/* Вес — inline editable look */}
      <div style={{ width: 88, padding: py, borderLeft:'1px solid #ccd', display:'flex',alignItems:'center' }}>
        <div style={{ flex:1, border:'1px dashed #999', borderRadius:2, padding:'0 5px', background:processed?'#f0f0f0':'#fffdf2', display:'flex',alignItems:'center',gap:3 }}>
          <Label size={12} bold color={textCol} style={{textDecoration:textDeco}}>{kg.toLocaleString()}</Label>
          <div style={{flex:1}}/>
          <Label size={9} color="#bbb">✎</Label>
        </div>
      </div>
      {/* Поставщик */}
      <div style={{ width: 118, padding: py, borderLeft:'1px solid #ccd', display:'flex',alignItems:'center' }}>
        <Label size={12} color={textCol} style={{whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', textDecoration:textDeco}}>{supplier}</Label>
      </div>
      {/* Тара */}
      <div style={{ width: 78, padding: py, borderLeft:'1px solid #ccd', display:'flex',alignItems:'center' }}>
        {tara ? <Pill color="#fff" size={11}>{tara}</Pill> : <Label size={11} color="#bbb">—</Label>}
      </div>
      {/* Переработка: чекбокс + № акта — read-only */}
      <div style={{ flex:1, minWidth: 110, padding: py, borderLeft:'1px solid #ccd', display:'flex',alignItems:'center', gap:5 }}>
        <div style={{
          width:14, height:14, border:'1.5px solid #333', borderRadius:2,
          background: processed ? '#1a6b3a' : '#fff',
          display:'flex',alignItems:'center',justifyContent:'center', flexShrink:0
        }}>
          {processed && <span style={{ color:'#fff', fontSize:10, lineHeight:1, fontWeight:700 }}>✓</span>}
        </div>
        <div style={{
          flex:1, border:'1px dashed #aaa', borderRadius:2, padding:'0 5px',
          background: processed ? '#e8f0e4' : '#fafafa',
          minHeight: 16, display:'flex', alignItems:'center'
        }}>
          <Label size={11} color={processed ? '#1a6b3a' : '#bbb'} style={{fontFamily:'JetBrains Mono,monospace', fontSize:10, whiteSpace:'nowrap'}}>
            {processed ? `№ ${actNumber}` : '№ акта'}
          </Label>
        </div>
      </div>
      {/* Редактировать */}
      <div title="Редактировать" style={{
        width: 28, borderLeft:'1px solid #ccd',
        display:'flex',alignItems:'center',justifyContent:'center', cursor:'pointer',
        background: processed ? 'transparent' : 'transparent'
      }}>
        <Label size={14} color="#555">✎</Label>
      </div>
    </div>
  );
};

/* SHIPMENT BLOCK — shared meta + N items */
const Shipment = ({ shipDate, arrDate, driver, tk, status, comment, items, compact }) => {
  const planned = status === 'Запланировано';
  const metaW = compact ? 320 : 360;
  return (
    <div style={{
      display:'flex',
      borderBottom: '1.5px solid #c8c8c0',
      background: planned ? 'repeating-linear-gradient(-45deg,#fff,#fff 6px,#fff8e8 6px,#fff8e8 8px)' : '#fff',
    }}>
      {/* LEFT — shared meta: dates · driver · TK · status in ONE row; comment below */}
      <div style={{ width: metaW, padding: compact ? '3px 8px' : '4px 10px', borderRight:'1.5px solid #aaa', display:'flex', flexDirection:'column', gap: compact ? 1 : 2, justifyContent:'center' }}>
        <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'nowrap' }}>
          <Label size={13} bold color="#333" style={{whiteSpace:'nowrap'}}>{shipDate}</Label>
          <Label size={11} color="#bbb">→</Label>
          <Label size={13} bold color="#1a6b3a" style={{whiteSpace:'nowrap', marginRight:4}}>{arrDate}</Label>
          <Label size={11} color="#555" style={{whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', flex:1, minWidth:0}}>
            🚚 {driver} · <span style={{color:'#888'}}>{tk}</span>
          </Label>
          <StatusChip status={status} />
        </div>
        {comment && (
          <div style={{ display:'flex', gap:3, alignItems:'center' }}>
            <Label size={10} color="#a06000">💬</Label>
            <Label size={10} color="#a06000" style={{ fontStyle:'italic', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{comment}</Label>
          </div>
        )}
      </div>
      {/* RIGHT — items list */}
      <div style={{ flex: 1 }}>
        {items.map((it, i) => (
          <ItemLine key={i} {...it} isFirst={i===0} isLast={i===items.length-1} compact={compact} />
        ))}
      </div>
    </div>
  );
};

/* ─────────── VARIANT A: Таблица-аккордеон ─────────── */
const VariantA = () => {
  const [week17open, setW17] = useState(true);
  const [day21open, setD21] = useState(true);
  const [day22open, setD22] = useState(true);
  const [week16open, setW16] = useState(false);
  const [compact, setCompact] = useState(false);
  const metaW = compact ? 320 : 360;
  const scrollRef = React.useRef(null);
  const currentWeekRef = React.useRef(null);

  React.useEffect(() => {
    // Scroll current week into view on mount (no smooth behavior to avoid animation on load)
    if (scrollRef.current && currentWeekRef.current) {
      scrollRef.current.scrollTop = currentWeekRef.current.offsetTop - 4;
    }
    // Auto-hiding scrollbar: add class while scrolling, remove after inactivity
    const el = scrollRef.current;
    if (!el) return;
    let t;
    const onScroll = () => {
      el.classList.add('is-scrolling');
      clearTimeout(t);
      t = setTimeout(() => el.classList.remove('is-scrolling'), 900);
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => { clearTimeout(t); el.removeEventListener('scroll', onScroll); };
  }, []);

  return (
    <div style={{ padding: 12, fontFamily: 'Caveat' }}>
      {/* Toolbar */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 10, alignItems: 'center', flexWrap: 'wrap' }}>
        <Box className="sk-gray" style={{ padding: '5px 16px', cursor: 'pointer', display:'flex',alignItems:'center',gap:6, background:'#1a6b3a', borderColor:'#0d4020', minWidth:140 }}>
          <span style={{fontSize:14, color:'#fff'}}>＋</span><Label size={14} bold color="#fff" style={{whiteSpace:'nowrap'}}>Отгрузка</Label>
        </Box>
        <div style={{ flex: 1 }} />
        <Box className="sk-gray" style={{ padding: '5px 10px' }}><Label size={13}>🔍 Поиск</Label></Box>
        <Box className="sk-gray" style={{ padding: '5px 10px' }}><Label size={13}>⌕ Фильтры</Label></Box>
        <Box className="sk-gray" style={{ padding: '5px 10px' }}><Label size={13}>⚙ Колонки</Label></Box>
        <Box className="sk-gray" style={{ padding: '5px 10px' }}><Label size={13}>↓ Excel</Label></Box>
        <Box className="sk-gray" style={{ padding: '5px 10px' }}><Label size={13}>🖨</Label></Box>
        <Box
          onClick={() => setCompact(!compact)}
          className="sk-gray"
          style={{ padding: '5px 10px', cursor:'pointer', background: compact ? '#1a6b3a' : '#e8e5df', borderColor: compact ? '#0d4020' : '#333' }}
        >
          <Label size={13} bold color={compact ? '#fff' : '#333'}>
            {compact ? '▣ Компакт ✓' : '□ Компакт'}
          </Label>
        </Box>
      </div>

      {/* Filters bar */}
      <div style={{ display:'flex', gap:6, marginBottom: 8, alignItems:'center', flexWrap:'wrap', padding:'6px 8px', background:'#f5f3ed', border:'1.5px solid #ccc', borderRadius:3 }}>
        <Label size={13} bold color="#555" style={{marginRight:4}}>Фильтры:</Label>
        <Box className="sk-gray" style={{ padding:'3px 10px', cursor:'pointer', background:'#1a6b3a', borderColor:'#0d4020' }}>
          <Label size={12} color="#fff" bold>📅 17 неделя ▾</Label>
        </Box>
        <Box className="sk-gray" style={{ padding:'3px 10px', cursor:'pointer' }}>
          <Label size={12}>🏢 Поставщик: все ▾</Label>
        </Box>
        <Box className="sk-gray" style={{ padding:'3px 10px', cursor:'pointer' }}>
          <Label size={12}>🥒 Сырьё: все ▾</Label>
        </Box>
        <Box className="sk-gray" style={{ padding:'3px 10px', cursor:'pointer' }}>
          <Label size={12}>◷ Статус: все ▾</Label>
        </Box>
        <Box className="sk-gray" style={{ padding:'3px 10px', cursor:'pointer' }}>
          <Label size={12}>☑ Переработка: все ▾</Label>
        </Box>
        <div style={{ flex:1 }} />
        <Label size={11} color="#888" style={{fontStyle:'italic'}}>очистить все</Label>
      </div>

      {/* Table container */}
      <div style={{ border: '2px solid #333', borderRadius: 3, overflow: 'hidden', background: '#fff' }}>
        {/* Column header */}
        <div style={{ display:'flex', background:'#2a2a2a', color:'#fff' }}>
          <div style={{ width: metaW, padding:'5px 10px', borderRight:'1px solid #555' }}>
            <Label size={12} bold color="#fff" style={{whiteSpace:'nowrap'}}>Отгр. → Пост. · Водитель · ТК · Статус</Label>
          </div>
          <div style={{ width: 4 }}/>
          <div style={{ width: 102, padding:'5px 6px', borderRight:'1px solid #555' }}>
            <Label size={12} bold color="#fff">Сырьё</Label>
          </div>
          <div style={{ width: 88, padding:'5px 6px', borderRight:'1px solid #555' }}>
            <Label size={12} bold color="#fff">Вес, кг</Label>
          </div>
          <div style={{ width: 118, padding:'5px 6px', borderRight:'1px solid #555' }}>
            <Label size={12} bold color="#fff">Поставщик</Label>
          </div>
          <div style={{ width: 78, padding:'5px 6px', borderRight:'1px solid #555' }}>
            <Label size={12} bold color="#fff">Тара</Label>
          </div>
          <div style={{ flex: 1, minWidth: 110, padding:'5px 6px', borderRight:'1px solid #555' }}>
            <Label size={12} bold color="#fff">☑ Переработка · № акта</Label>
          </div>
          <div style={{ width: 28, padding:'5px 0', textAlign:'center' }}>
            <Label size={11} bold color="#fff">⚙</Label>
          </div>
        </div>

        {/* Scrollable body */}
        <div ref={scrollRef} className="wsm-scroll" style={{ maxHeight: 560, overflowY: 'auto' }}>

        {/* Past weeks (10–15) — all collapsed */}
        {[
          { n: 10, range: '3–8 марта', kg: 172400 },
          { n: 11, range: '10–15 марта', kg: 188900 },
          { n: 12, range: '17–22 марта', kg: 195600 },
          { n: 13, range: '24–29 марта', kg: 210300 },
          { n: 14, range: '31 мар– 5 апр', kg: 186700 },
          { n: 15, range: '7–12 апр', kg: 203500 },
        ].map(w => (
          <div key={w.n} style={{
            display:'flex', alignItems:'center', gap:8,
            padding:'5px 8px', background:'#6a6a6a', cursor:'pointer',
            borderBottom:'1px solid #333'
          }}>
            <span style={{ color:'#fff', fontSize:16 }}>▸</span>
            <Label size={14} bold color="#fff" style={{whiteSpace:'nowrap'}}>{w.n} неделя · {w.range}</Label>
            <div style={{ flex:1 }} />
            <Pill color="#3a3a3a" textColor="#ffd" size={11}>Σ {w.kg.toLocaleString()} кг</Pill>
          </div>
        ))}

        {/* WEEK 16 — collapsed */}
        <div
          onClick={() => setW16(!week16open)}
          style={{
            display: 'flex', alignItems: 'center', gap: 8,
            padding: '5px 8px', background: '#555', cursor: 'pointer',
            borderBottom: '2px solid #333'
          }}
        >
          <span style={{ color: '#fff', fontSize: 16 }}>{week16open ? '▾' : '▸'}</span>
          <Label size={15} bold color="#fff" style={{whiteSpace:'nowrap'}}>16 неделя · 14–19 апр</Label>
          <div style={{ flex: 1 }} />
          <Pill color="#3a3a3a" textColor="#ccc" size={12}>6 дн.</Pill>
          <Pill color="#3a3a3a" textColor="#ffd" size={12}>Σ 198 450 кг</Pill>
        </div>

        {/* WEEK 17 */}
        <div ref={currentWeekRef} onClick={() => setW17(!week17open)} style={{
          display: 'flex', alignItems: 'center', gap: 8,
          padding: '6px 8px', background: '#1a6b3a', cursor: 'pointer',
          borderBottom: '2px solid #333'
        }}>
          <span style={{ color: '#fff', fontSize: 16 }}>{week17open ? '▾' : '▸'}</span>
          <Label size={15} bold color="#fff" style={{whiteSpace:'nowrap'}}>17 неделя · 21–26 апр</Label>
          <div style={{ flex: 1 }} />
          <Pill color="#12532c" textColor="#cff" size={12}>4/6 дн.</Pill>
          <Pill color="#12532c" textColor="#ffd" size={12}>Σ 241 800 кг</Pill>
        </div>

        {week17open && <>
          {/* Day 21 */}
          <div onClick={() => setD21(!day21open)} style={{
            display: 'flex', alignItems: 'center', gap: 6,
            padding: '4px 8px 4px 24px', background: '#e8f4ed',
            borderBottom: '1px solid #ccc', cursor: 'pointer'
          }}>
            <span style={{ fontSize: 13 }}>{day21open ? '▾' : '▸'}</span>
            <Label size={14} bold color="#1a6b3a" style={{whiteSpace:'nowrap'}}>21 апр, пн</Label>
            <div style={{ flex: 1 }} />
            <Label size={12} color="#555" style={{whiteSpace:'nowrap'}}>4 маш · 7 поз · Σ 68 200 кг</Label>
          </div>
          {day21open && <>
            {/* Shipment 1 — single-item (one supplier, one raw) */}
            <Shipment
compact={compact}               shipDate="19 апр" arrDate="21 апр"
              driver="Вихров П." tk="ИП Фастов"
              status="Отправлено"
              items={[{ raw:'Огурцы', kg:18500, supplier:'Байрамов А.', tara:'ящик×420' }]}
            />
            {/* Shipment 2 — MIXED: 2 raws from 2 suppliers in one truck */}
            <Shipment
compact={compact}               shipDate="20 апр" arrDate="21 апр"
              driver="Мартыно В." tk="ИП Рябов"
              status="Отправлено"
              comment="Догруз по пути"
              items={[
                { raw:'Черри', kg:10000, supplier:'Цой К.Т.', tara:null },
                { raw:'Томаты', kg:10000, supplier:'Ким Т.', tara:null },
              ]}
            />
            {/* Shipment 3 — same supplier, 2 raws */}
            <Shipment
compact={compact}               shipDate="20 апр" arrDate="21 апр"
              driver="Кузнецов А." tk="ТК Авто"
              status="Отправлено"
              items={[
                { raw:'Патиссоны', kg:8536, supplier:'Генералов', tara:null },
                { raw:'Халапеньо', kg:12440, supplier:'Генералов', tara:'бочка×20' },
              ]}
            />
            {/* Shipment 4 — planned, not yet sent */}
            <Shipment
compact={compact}               shipDate="21 апр" arrDate="21 апр"

            <Label size={13} bold>Позиции в машине</Label>
            <Label size={11} color="#888">можно добавить несколько — разные поставщики и/или сырьё</Label>
          </div>

          {/* Items list */}
          <div style={{ border:'1.5px solid #333', borderRadius:3, overflow:'hidden' }}>
            {/* Header */}
            <div style={{ display:'flex', background:'#2a2a2a', color:'#fff', padding:'3px 6px', gap:6 }}>
              <Label size={11} bold color="#fff" style={{ width:16 }}>№</Label>
              <Label size={11} bold color="#fff" style={{ flex:1.3 }}>Сырьё *</Label>
              <Label size={11} bold color="#fff" style={{ flex:1 }}>Вес, кг *</Label>
              <Label size={11} bold color="#fff" style={{ flex:1.5 }}>Поставщик *</Label>
              <Label size={11} bold color="#fff" style={{ flex:1.3 }}>Тара <span style={{fontWeight:400,opacity:0.7}}>опц.</span></Label>
              <Label size={11} bold color="#fff" style={{ width:20 }}></Label>
            </div>
            {items.map((it, i) => {
              const c = RAW_COLORS[it.raw] || { bg:'#eee', dot:'#999' };
              return (
                <div key={i} style={{
                  display:'flex', gap:6, padding:'4px 6px',
                  background: c.bg + '55', borderBottom:'1px dashed #ccc', alignItems:'center'
                }}>
                  <Label size={11} color="#888" style={{ width:16 }}>{i+1}</Label>
                  <div style={{ flex:1.3, border:'1px solid #aaa', borderRadius:2, padding:'2px 5px', background:'#fff', display:'flex', alignItems:'center', gap:4 }}>
                    <div style={{ width:8, height:8, borderRadius:8, background:c.dot }}/>
                    <Label size={12} bold>{it.raw}</Label>
                    <div style={{ flex:1 }}/>
                    <Label size={10} color="#999">▾</Label>
                  </div>
                  <div style={{ flex:1, border:'1px solid #aaa', borderRadius:2, padding:'2px 5px', background:'#fff' }}>
                    <Label size={12}>{it.kg}</Label>
                  </div>
                  <div style={{ flex:1.5, border:'1px solid #aaa', borderRadius:2, padding:'2px 5px', background:'#fff', display:'flex', alignItems:'center' }}>
                    <Label size={12}>{it.supplier}</Label>
                    <div style={{ flex:1 }}/>
                    <Label size={10} color="#999">▾</Label>
                  </div>
                  <div style={{ flex:1.3, border:'1px solid #aaa', borderRadius:2, padding:'2px 5px', background: it.tara === '—' ? '#f5f3ef' : '#fff', display:'flex', alignItems:'center' }}>
                    <Label size={12} color={it.tara === '—' ? '#bbb' : '#333'}>{it.tara}</Label>
                    <div style={{ flex:1 }}/>
                    <Label size={10} color="#999">▾</Label>
                  </div>
                  <Label size={14} color="#c33" style={{ width:20, textAlign:'center', cursor:'pointer' }}>✕</Label>
                </div>
              );
            })}
            {/* Add row */}
            <div style={{ padding:'5px 8px', background:'#f0f0c8', cursor:'pointer', borderTop:'1px solid #bbb' }}>
              <Label size={12} bold color="#1a6b3a">＋ Добавить позицию (ещё сырьё / ещё поставщик)</Label>
            </div>
          </div>

          {/* Summary */}
          <div style={{ marginTop:8, padding:'5px 10px', background:'#eef6ee', borderRadius:3, display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
            <Label size={12} bold color="#1a6b3a">Итого в машине:</Label>
            <Pill color="#fff" size={11}>Σ 21 200 кг</Pill>
            <Pill color="#fff" size={11}>3 позиции</Pill>
            <Pill color="#fff" size={11}>2 поставщика</Pill>
            <Pill color="#fff" size={11}>бочка: 6</Pill>
          </div>

          <HR my={10} />
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            <Box className="sk-gray" style={{ padding: '5px 16px', cursor: 'pointer' }}>
              <Label size={13}>Отмена</Label>
            </Box>
            <div style={{
              background: '#eee', border: '2px solid #333',
              padding: '5px 16px', borderRadius: 3, cursor: 'pointer'
            }}>
              <Label size={13}>Сохранить как запланировано</Label>
            </div>
            <div style={{
              background: '#1a6b3a', border: '2px solid #333',
              padding: '5px 16px', borderRadius: 3, cursor: 'pointer'
            }}>
              <Label size={13} bold color="#fff">✓ Сохранить и отправить</Label>
            </div>
          </div>
        </div>
      </div>

      <div style={{ marginTop: 10, padding: '8px 12px', background: '#fffbe8', border: '1.5px dashed #e09a20', borderRadius: 4 }}>
        <Label size={13} color="#b06000">✦ Одна машина = одна отгрузка с N позициями · общая шапка (водитель/ТК/даты/статус) · позиции с разным сырьём и поставщиками · опц. тара и комментарий</Label>
      </div>
    </div>
  );
};

/* ─────────── MAIN ─────────── */
const App = () => (
  <DesignCanvas title="Учёт отгрузок — Вайрфреймы">
    <DCSection id="main" title="Главная — варианты отображения">
      <DCArtboard id="a" label="A · Таблица-аккордеон" width={960} height={780}>
        <VariantA />
      </DCArtboard>
      <DCArtboard id="b" label="B · Карточки по дням" width={500} height={420}>
        <VariantB />
      </DCArtboard>
      <DCArtboard id="c" label="C · Дашборд + таблица" width={520} height={460}>
        <VariantC />
      </DCArtboard>
    </DCSection>
    <DCSection id="aux" title="Вспомогательные экраны">
      <DCArtboard id="d" label="D · Справочники" width={420} height={400}>
        <VariantD />
      </DCArtboard>
      <DCArtboard id="e" label="E · Форма добавления (мульти-позиции)" width={720} height={680}>
        <VariantE />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
