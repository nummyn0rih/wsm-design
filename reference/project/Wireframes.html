<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wireframes — Учёт отгрузок</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ede8; font-family: 'Caveat', cursive; }

  /* Sketch styles */
  .sk { font-family: 'Caveat', cursive; }
  .sk-box {
    border: 2px solid #333;
    border-radius: 3px;
    background: #fff;
    position: relative;
  }
  .sk-box::before {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 2px;
    border: 1px solid #aaa;
    pointer-events: none;
  }
  .sk-gray { background: #e8e5df; }
  .sk-stripe {
    background: repeating-linear-gradient(
      -45deg, #f5f3ef, #f5f3ef 4px, #e8e5df 4px, #e8e5df 8px
    );
  }
  .sk-label {
    font-family: 'Caveat', cursive;
    font-size: 13px;
    color: #666;
    text-align: center;
    padding: 4px;
  }
  .sk-accent { background: #d4e8c2; }
  .sk-accent2 { background: #c2d4e8; }
  .sk-accent3 { background: #e8d4c2; }
  .sk-accent4 { background: #e8c2d4; }
  .sk-week { background: #2a2a2a; color: #fff; }
  .sk-day { background: #444; color: #fff; }
  .sk-subtotal { background: #f0f0c8; border-top: 2px dashed #bbb; }

  /* Auto-hiding overlay scrollbar */
  .wsm-scroll {
    scrollbar-width: thin;
    scrollbar-color: transparent transparent;
    transition: scrollbar-color 0.4s ease;
  }
  .wsm-scroll:hover,
  .wsm-scroll.is-scrolling {
    scrollbar-color: rgba(60,60,60,0.55) transparent;
  }
  .wsm-scroll::-webkit-scrollbar {
    width: 8px;
  }
  .wsm-scroll::-webkit-scrollbar-track {
    background: transparent;
  }
  .wsm-scroll::-webkit-scrollbar-thumb {
    background: transparent;
    border-radius: 4px;
    transition: background 0.4s ease;
  }
  .wsm-scroll:hover::-webkit-scrollbar-thumb,
  .wsm-scroll.is-scrolling::-webkit-scrollbar-thumb {
    background: rgba(60,60,60,0.55);
  }
  .wsm-scroll::-webkit-scrollbar-thumb:hover {
    background: rgba(40,40,40,0.75);
  }

  .annotation {
    font-family: 'Caveat', cursive;
    font-size: 14px;
    color: #e05a1a;
    position: absolute;
    pointer-events: none;
  }
  .arrow {
    display: inline-block;
    font-size: 18px;
    color: #e05a1a;
  }
</style>
</head>
<body>
<script type="text/babel">
const { useState } = React;

/* ─────────── REUSABLE SKETCH ATOMS ─────────── */

const Box = ({ w, h, style, className = '', children, onClick }) => (
  <div
    onClick={onClick}
    className={`sk-box ${className}`}
    style={{ width: w, height: h, overflow: 'hidden', ...style }}
  >
    {children}
  </div>
);

const Label = ({ children, size = 13, color = '#555', bold, center, style = {} }) => (
  <div style={{
    fontFamily: 'Caveat, cursive',
    fontSize: size,
    color,
    fontWeight: bold ? 700 : 400,
    textAlign: center ? 'center' : 'left',
    lineHeight: 1.2,
    ...style
  }}>
    {children}
  </div>
);

const Pill = ({ children, color = '#e8e5df', textColor = '#333', size = 12 }) => (
  <div style={{
    display: 'inline-flex', alignItems: 'center', padding: '1px 8px',
    background: color, border: '1.5px solid #333', borderRadius: 20,
    fontFamily: 'Caveat', fontSize: size, color: textColor,
    whiteSpace: 'nowrap'
  }}>
    {children}
  </div>
);

const HR = ({ dashed, color = '#bbb', my = 4 }) => (
  <div style={{
    borderTop: `1.5px ${dashed ? 'dashed' : 'solid'} ${color}`,
    margin: `${my}px 0`
  }} />
);

const Row = ({ cols, heights = 26, bg, bold, border }) => {
  const colWidths = cols.map(c => c.w || 80);
  return (
    <div style={{
      display: 'flex',
      height: heights,
      background: bg || 'transparent',
      borderBottom: border ? '1px solid #ccc' : undefined
    }}>
      {cols.map((c, i) => (
        <div key={i} style={{
          width: colWidths[i],
          flexShrink: 0,
          borderRight: i < cols.length - 1 ? '1px solid #ccc' : undefined,
          padding: '2px 5px',
          display: 'flex',
          alignItems: 'center',
          overflow: 'hidden'
        }}>
          <span style={{
            fontFamily: 'Caveat, cursive',
            fontSize: c.size || 12,
            color: c.color || (bold ? '#000' : '#333'),
            fontWeight: bold || c.bold ? 700 : 400,
            whiteSpace: 'nowrap',
            overflow: 'hidden',
            textOverflow: 'ellipsis'
          }}>
            {c.text}
          </span>
        </div>
      ))}
    </div>
  );
};

/* ─────────── COLOR MAP BY RAW MATERIAL ─────────── */
const RAW_COLORS = {
  'Огурцы':    { bg: '#d4eac2', dot: '#4a8f2a' },
  'Черри':     { bg: '#ffd0c0', dot: '#c24a28' },
  'Томаты':    { bg: '#ffe0b8', dot: '#c87020' },
  'Патиссоны': { bg: '#fff4a8', dot: '#c49a00' },
  'Халапеньо': { bg: '#c4dca8', dot: '#1e5020' },
  'Перец':     { bg: '#f0d8c8', dot: 'linear-gradient(135deg,#c03030 0%,#c03030 50%,#3a8a2a 50%,#3a8a2a 100%)' },
  'Баклажан':  { bg: '#d8c0e8', dot: '#6030a0' },
  /* сезонные овощи — справочник расширен, в плане могут быть скрыты при отсутствии отгрузок */
  'Кабачки':   { bg: '#e0e8c8', dot: '#7a9030' },
  'Тыква':     { bg: '#ffd8a8', dot: '#d07820' },
  'Морковь':   { bg: '#ffd0b0', dot: '#d05820' },
  'Свёкла':    { bg: '#e8c0d0', dot: '#8a2050' },
  'Лук':       { bg: '#f5e8c8', dot: '#a07820' },
  'Капуста':   { bg: '#e0ead8', dot: '#5a8050' },
};

/* Status chip */
const StatusChip = ({ status }) => {
  if (status === 'План') {
    return <Pill color="#e2d4f0" textColor="#5530a0" size={11}>✎ План</Pill>;
  }
  if (status === 'Прибыло') {
    return <Pill color="#c8d8e8" textColor="#1a4a8a" size={11}>⚑ Прибыло</Pill>;
  }
  if (status === 'Отправлено') {
    return <Pill color="#c8e8c8" textColor="#1a6b3a" size={11}>✓ Отпр.</Pill>;
  }
  return <Pill color="#fff0c8" textColor="#a06000" size={11}>◷ Заплан.</Pill>;
};

/* QUALITY BADGE — статус качества рядом с № акта
   Состояния:
     none  — 📊 (серый)         данные не внесены, PDF не прикреплён
     data  — 📊✓ (зелёный)       структурированные данные внесены
     pdf   — 📎 (синий)          прикреплён только PDF
     both  — 📊✓📎               и данные, и PDF
   Клик → открывает модалку «Качество приёмки»
   Hover → тултип со сводкой
*/
const QualityBadge = ({ quality, posInfo }) => {
  const hasData = !!quality?.hasData;
  const hasPdf  = !!quality?.hasPdf;
  const both    = hasData && hasPdf;
  const state   = both ? 'both' : hasData ? 'data' : hasPdf ? 'pdf' : 'none';

  // tooltip
  let tip;
  if (hasData && quality?.summary) {
    const s = quality.summary;
    const fmt = (n) => n.toLocaleString('ru-RU');
    tip =
      `К оплате: ${fmt(s.payable)} кг (${s.pct}%)` +
      ` · Брак: ${fmt(s.reject)} кг` +
      ` · Нестандарт: ${fmt(s.nonStd)} кг` +
      (hasPdf ? ' · PDF акта прикреплён' : '');
  } else if (hasPdf) {
    tip = 'Прикреплён PDF акта · структурированные данные качества ещё не внесены';
  } else {
    tip = 'Данные качества не внесены, PDF не прикреплён · клик — открыть форму';
  }

  // colors per state
  const palette = {
    none: { bg:'#ececec', border:'#999',    fg:'#666' },
    data: { bg:'#e4f1e0', border:'#1a6b3a', fg:'#1a6b3a' },
    pdf:  { bg:'#e0ebf6', border:'#1a4a8a', fg:'#1a4a8a' },
    both: { bg:'#e4f1e0', border:'#1a6b3a', fg:'#1a6b3a' },
  }[state];

  const onClick = (e) => {
    e.stopPropagation();
    if (window.__openQuality) window.__openQuality({ ...posInfo, quality });
  };

  return (
    <span
      title={tip}
      onClick={onClick}
      style={{
        display:'inline-flex', alignItems:'center', gap:1,
        padding:'0 4px', height:16,
        background: palette.bg,
        border:`1.2px solid ${palette.border}`,
        borderRadius: 9,
        cursor:'pointer',
        flexShrink:0,
        lineHeight:1,
      }}
    >
      {(state === 'none' || state === 'data' || state === 'both') && (
        <span style={{ fontSize:10 }}>📊</span>
      )}
      {(state === 'data' || state === 'both') && (
        <span style={{ fontFamily:'JetBrains Mono, monospace', fontSize:9, fontWeight:700, color:palette.fg, marginLeft:-1 }}>✓</span>
      )}
      {(state === 'pdf' || state === 'both') && (
        <span style={{ fontSize:10, marginLeft: state === 'both' ? 1 : 0 }}>📎</span>
      )}
    </span>
  );
};

/* ITEM LINE — one supplier+raw within a shipment */
const ItemLine = ({ raw, kg, supplier, tara, processed, actNumber, quality, isFirst, isLast, compact }) => {
  const c = RAW_COLORS[raw] || { bg: '#eee', dot: '#999' };
  const py = compact ? '1px 6px' : '2px 6px';
  const minH = compact ? 20 : 24;
  const rowBg = processed
    ? 'repeating-linear-gradient(135deg,#ececec,#ececec 4px,#e0e0e0 4px,#e0e0e0 8px)'
    : c.bg + '55';
  const textDeco = processed ? 'line-through' : 'none';
  const textCol  = processed ? '#666' : '#222';
  return (
    <div style={{
      display:'flex', alignItems:'stretch',
      background: rowBg,
      borderTop: isFirst ? 'none' : '1px dashed #c8d0bd',
      minHeight: minH
    }}>
      <div style={{ width: 4, background: c.dot, flexShrink: 0 }} />
      {/* Сырьё */}
      <div style={{ width: 102, padding: py, display:'flex',alignItems:'center',gap:4 }}>
        <div style={{ width:8, height:8, borderRadius:8, background:c.dot, flexShrink:0 }} />
        <Label size={12} bold color={textCol} style={{textDecoration:textDeco}}>{raw}</Label>
      </div>
      {/* Вес — inline editable look */}
      <div style={{ width: 88, padding: py, borderLeft:'1px solid #ccd', display:'flex',alignItems:'center' }}>
        <div style={{ flex:1, border:'1px dashed #999', borderRadius:2, padding:'0 5px', background:processed?'#f0f0f0':'#fffdf2', display:'flex',alignItems:'center',gap:3 }}>
          <Label size={12} bold color={textCol} style={{textDecoration:textDeco}}>{kg.toLocaleString()}</Label>
          <div style={{flex:1}}/>
          <Label size={9} color="#bbb">✎</Label>
        </div>
      </div>
      {/* Поставщик */}
      <div style={{ width: 118, padding: py, borderLeft:'1px solid #ccd', display:'flex',alignItems:'center' }}>
        <Label size={12} color={textCol} style={{whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', textDecoration:textDeco}}>{supplier}</Label>
      </div>
      {/* Тара */}
      <div style={{ width: 78, padding: py, borderLeft:'1px solid #ccd', display:'flex',alignItems:'center' }}>
        {tara ? <Pill color="#fff" size={11}>{tara}</Pill> : <Label size={11} color="#bbb">—</Label>}
      </div>
      {/* Переработка: чекбокс + № акта (+ статус качества) — read-only */}
      <div style={{ flex:1, minWidth: 110, padding: py, borderLeft:'1px solid #ccd', display:'flex',alignItems:'center', gap:5 }}>
        <div style={{
          width:14, height:14, border:'1.5px solid #333', borderRadius:2,
          background: processed ? '#1a6b3a' : '#fff',
          display:'flex',alignItems:'center',justifyContent:'center', flexShrink:0
        }}>
          {processed && <span style={{ color:'#fff', fontSize:10, lineHeight:1, fontWeight:700 }}>✓</span>}
        </div>
        <div style={{
          flex:1, border:'1px dashed #aaa', borderRadius:2, padding:'0 4px 0 5px',
          background: processed ? '#e8f0e4' : '#fafafa',
          minHeight: 18, display:'flex', alignItems:'center', gap:4
        }}>
          <Label size={11} color={processed ? '#1a6b3a' : '#bbb'} style={{fontFamily:'JetBrains Mono,monospace', fontSize:10, whiteSpace:'nowrap'}}>
            {processed ? `№ ${actNumber}` : '№ акта'}
          </Label>
          <div style={{flex:1}}/>
          {processed && (
            <QualityBadge
              quality={quality}
              posInfo={{ raw, supplier, kg, actNumber }}
            />
          )}
        </div>
      </div>
      {/* Редактировать */}
      <div title="Редактировать" style={{
        width: 28, borderLeft:'1px solid #ccd',
        display:'flex',alignItems:'center',justifyContent:'center', cursor:'pointer',
        background: processed ? 'transparent' : 'transparent'
      }}>
        <Label size={14} color="#555">✎</Label>
      </div>
    </div>
  );
};

/* SHIPMENT BLOCK — shared meta + N items */
const Shipment = ({ shipDate, arrDate, driver, tk, status, comment, items }) => {
  const planned = status === 'Запланировано';
  const planLook = status === 'План';
  const metaW = 360;
  const openDriver = (e) => {
    e.stopPropagation();
    if (window.__openDriverCard) window.__openDriverCard(driver);
  };
  return (
    <div style={{
      display:'flex',
      borderBottom: '1.5px solid #c8c8c0',
      background: planned
        ? 'repeating-linear-gradient(-45deg,#fff,#fff 6px,#fff8e8 6px,#fff8e8 8px)'
        : (planLook ? '#faf7fe' : '#fff'),
      opacity: planLook ? 0.92 : 1,
      position: 'relative',
    }}>
      {/* План — фиолетовая «полоска» слева, мягко отличающая запись */}
      {planLook && (
        <div style={{
          position:'absolute', top:0, bottom:0, left:0, width:4,
          background:'#7a4ec0'
        }} />
      )}
      {/* LEFT — shared meta: dates · driver · TK · status in ONE row; comment below */}
      <div style={{ width: metaW, padding: '4px 10px', paddingLeft: planLook ? 14 : 10, borderRight:'1.5px solid #aaa', display:'flex', flexDirection:'column', gap: 2, justifyContent:'center' }}>
        <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'nowrap' }}>
          <Label size={13} bold color={planLook ? '#5530a0' : '#333'} style={{whiteSpace:'nowrap'}}>{shipDate}</Label>
          <Label size={11} color="#bbb">→</Label>
          <Label size={13} bold color={planLook ? '#5530a0' : '#1a6b3a'} style={{whiteSpace:'nowrap', marginRight:4}}>{arrDate}</Label>
          <Label size={11} color="#555" style={{whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', flex:1, minWidth:0}}>
            {planLook
              ? <span style={{ color:'#888', fontStyle:'italic' }}>🕒 водитель ещё не назначен</span>
              : <>🚚 <span
                  onClick={openDriver}
                  style={{ color:'#1a4a8a', textDecoration:'underline', textDecorationStyle:'dotted', cursor:'pointer' }}
                  title="Открыть карточку водителя"
                >{driver}</span> · <span style={{color:'#888'}}>{tk}</span></>
            }
          </Label>
          <StatusChip status={status} />
        </div>
        {comment && (
          <div style={{ display:'flex', gap:3, alignItems:'center' }}>
            <Label size={10} color="#a06000">💬</Label>
            <Label size={10} color="#a06000" style={{ fontStyle:'italic', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{comment}</Label>
          </div>
        )}
      </div>
      {/* RIGHT — items list */}
      <div style={{ flex: 1 }}>
        {items.map((it, i) => (
          <ItemLine key={i} {...it} isFirst={i===0} isLast={i===items.length-1} />
        ))}
      </div>
    </div>
  );
};

/* ─────────── DRIVER CARD MODAL — used in main table ─────────── */
const DRIVERS = {
  'Вихров П.':   { tk: 'ИП Фастов', phone: '+7 900 123-45-67', info: 'Volvo FH · К 245 ОР 77\nПаспорт 4512 №876342, выдан УФМС г. Москва\nСтаж: 12 лет · Опыт: рефрижератор, тент' },
  'Мартыно В.':  { tk: 'ИП Рябов',  phone: '+7 901 234-56-78', info: 'MAN TGX · О 891 РТ 50\nПаспорт 4513 №129084\nЛюбит догрузы, гибкий график' },
  'Кузнецов А.': { tk: 'ТК Авто',   phone: '+7 902 345-67-89', info: 'Scania R450 · Е 712 ВК 77\nТягач + полуприцеп 82 м³\nПаспорт 4514 №442910' },
  'Ахмедов Р.':  { tk: 'ТК Авто',   phone: '+7 903 456-78-90', info: 'DAF XF · М 045 НА 50\nПаспорт 4515 №776218\nПо предзаказу, бочки/IBC' },
  'Гриненко К.': { tk: 'ИП Кузн.',  phone: '+7 904 567-89-01', info: 'Renault T · А 318 СН 77\nПаспорт 4516 №334721\nИП Кузн., только томатная группа' },
  'Шахматов':    { tk: 'ТК Авто',   phone: '+7 905 678-90-12', info: 'Iveco Stralis · Х 902 ЕМ 50\nПаспорт 4517 №118650\nЧасто работает с перцем/баклажанами' },
};

const DriverModal = ({ name, onClose }) => {
  const d = DRIVERS[name] || { phone: '+7 — — —', info: 'Данные не заполнены' };
  const [toast, setToast] = useState(null);
  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 1400); };
  const copyText = (txt, msg) => {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(txt);
      } else {
        const ta = document.createElement('textarea');
        ta.value = txt; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); ta.remove();
      }
      flash(msg);
    } catch (e) { flash('Не удалось скопировать'); }
  };
  const all = `${name}\n${d.phone}\n${d.info}`;
  return (
    <div
      onClick={onClose}
      style={{
        position:'absolute', inset:0, background:'rgba(20,20,20,0.45)',
        display:'flex', alignItems:'center', justifyContent:'center',
        zIndex:50, fontFamily:'Caveat'
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: 380, background:'#fff',
          border:'2px solid #333', borderRadius:4,
          boxShadow:'4px 6px 0 rgba(0,0,0,0.18)',
          overflow:'hidden'
        }}
      >
        {/* Header */}
        <div style={{
          background:'#2a2a2a', color:'#fff',
          padding:'6px 12px', display:'flex', alignItems:'center', gap:8
        }}>
          <span style={{ fontSize:18 }}>👤</span>
          <Label size={15} bold color="#fff">Карточка водителя</Label>
          <div style={{ flex:1 }} />
          <span
            onClick={onClose}
            style={{ cursor:'pointer', color:'#fff', fontSize:18, lineHeight:1 }}
            title="Закрыть"
          >✕</span>
        </div>

        {/* Body */}
        <div style={{ padding:'10px 14px 4px' }}>
          <Label size={11} color="#888" style={{ textTransform:'uppercase', letterSpacing:1 }}>ФИО</Label>
          <div style={{ marginTop:2, marginBottom:8, display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
            <Label size={18} bold color="#222">{name}</Label>
            {d.tk && (
              <Pill color="#e8e5df" size={11}>🚛 {d.tk}</Pill>
            )}
          </div>

          <Label size={11} color="#888" style={{ textTransform:'uppercase', letterSpacing:1 }}>Телефон</Label>
          <div style={{
            marginTop:2, marginBottom:10, padding:'5px 8px',
            background:'#f5f3ed', border:'1.5px solid #ccc', borderRadius:3,
            display:'flex', alignItems:'center', gap:6
          }}>
            <span style={{ fontSize:14 }}>📞</span>
            <Label size={15} bold color="#1a4a8a" style={{ fontFamily:'JetBrains Mono, monospace' }}>{d.phone}</Label>
          </div>

          <Label size={11} color="#888" style={{ textTransform:'uppercase', letterSpacing:1 }}>Инфо</Label>
          <div style={{
            marginTop:2, marginBottom:10, padding:'6px 10px',
            background:'#fffbe8', border:'1.5px dashed #d4b878', borderRadius:3,
            minHeight:80, whiteSpace:'pre-wrap'
          }}>
            <Label size={13} color="#444">{d.info}</Label>
          </div>
          <Label size={10} color="#999" style={{ fontStyle:'italic' }}>
            Свободный текст: марка авто, госномер, паспортные данные и т.п.
          </Label>
        </div>

  const bg = active ? '#1a6b3a' : 'transparent';

    <div
      onClick={disabled ? undefined : onClick}
